<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Job Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
font-family:Segoe UI;
}

.card{
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.table thead{
background:#343a40;
color:white;
}

.action-btn{
margin-right:5px;
}

</style>
</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2 class="text-center mb-4">Admin Job Management</h2>

<table class="table table-hover text-center align-middle">

<thead>
<tr>
<th>ID</th>
<th>Company</th>
<th>Job Title</th>
<th>Location</th>
<th>Salary</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="company : ${companyList}">

<td th:text="${company.id}"></td>

<td th:text="${company.companyName}"></td>

<td th:text="${company.jobtitle}"></td>

<td th:text="${company.location}"></td>

<td>₹ <span th:text="${company.salary}"></span></td>

<td>

	<a th:href="@{/admin/edit/{id}(id=${company.id})}" class="btn btn-warning">
	Edit
	</a>

<a th:href="@{/admin/delete/{id}(id=${company.id})}"
class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure to delete this job?')">
Delete
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
