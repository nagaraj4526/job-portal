<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Applications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Job Applications</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Position</th>
			<th>Status</th>
			<th>Action</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="app : ${applications}">
            <td th:text="${app.name}"></td>
            <td th:text="${app.email}"></td>
            <td th:text="${app.address}"></td>
			<td th:text="${app.position}"></td>
			<td th:text="${app.status}"></td>
           
		<td>
		    <!-- Interview -->
		    <form th:action="@{'/admin/call-interview/' + ${app.id}}" method="post" style="display:inline;">
		        <button class="btn btn-warning btn-sm">Interview</button>
		    </form>

		    <!-- Accept -->
		    <form th:action="@{'/admin/accept/' + ${app.id}}" method="post" style="display:inline;">
		        <button class="btn btn-success btn-sm">Accept</button>
		    </form>

		    <!-- Reject -->
		    <form th:action="@{'/admin/reject/' + ${app.id}}" method="post" style="display:inline;">
		        <button class="btn btn-danger btn-sm">Reject</button>
		    </form>

		    <!-- 🗑 Delete -->
		    <form th:action="@{'/admin/delete-application/' + ${app.id}}" 
		          method="post" 
		          style="display:inline;"
		          onsubmit="return confirm('Are you sure to delete this application?');">
		        <button class="btn btn-dark btn-sm">Delete</button>
		    </form>
		</td>        </tr>
    </tbody>
</table>

</body>
</html>
